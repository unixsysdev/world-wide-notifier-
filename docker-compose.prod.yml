version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=monitoring_db
      - POSTGRES_USER=monitoring_user
      - POSTGRES_PASSWORD=monitoring_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - monitoring_net
    # NO EXTERNAL PORT - only accessible internally

  # Redis Cache
  redis:
    image: redis:7-alpine
    networks:
      - monitoring_net
    # NO EXTERNAL PORT - only accessible internally

  # API Service - ONLY PUBLIC SERVICE
  api_service:
    build: ./api_service
    ports:
      - "8000:8000"  # ONLY public port
    environment:
      - DATABASE_URL=postgresql://monitoring_user:monitoring_pass@postgres:5432/monitoring_db
      - REDIS_URL=redis://redis:6379
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-service-key-change-in-production}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./api_service:/app
    networks:
      - monitoring_net

  # Browser Service - INTERNAL ONLY
  browser_service:
    build: ./browser_service
    # NO EXTERNAL PORT - only accessible internally via Docker network
    environment:
      - REDIS_URL=redis://redis:6379
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-service-key-change-in-production}
    depends_on:
      - redis
    volumes:
      - browser_data:/app/browser_data
    networks:
      - monitoring_net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Worker Manager - INTERNAL ONLY
  worker_manager:
    build: ./worker_manager
    # NO EXTERNAL PORT - only accessible internally
    environment:
      - DATABASE_URL=postgresql://monitoring_user:monitoring_pass@postgres:5432/monitoring_db
      - REDIS_URL=redis://redis:6379
      - BROWSER_SERVICE_URL=http://browser_service:8001
      - LLM_SERVICE_URL=http://llm_service:8002
      - HOSTNAME=${HOSTNAME:-localhost}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-service-key-change-in-production}
    depends_on:
      - postgres
      - redis
      - browser_service
    volumes:
      - ./worker_manager:/app
    networks:
      - monitoring_net

  # LLM Service - INTERNAL ONLY
  llm_service:
    build: ./llm_service
    # NO EXTERNAL PORT - only accessible internally
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-service-key-change-in-production}
    volumes:
      - ./llm_service:/app
    networks:
      - monitoring_net

  # Notification Service - INTERNAL ONLY
  notification_service:
    build: ./notification_service
    # NO EXTERNAL PORT - only accessible internally
    environment:
      - DATABASE_URL=postgresql://monitoring_user:monitoring_pass@postgres:5432/monitoring_db
      - REDIS_URL=redis://redis:6379
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL}
      - TEAMS_WEBHOOK=${TEAMS_WEBHOOK}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-service-key-change-in-production}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./notification_service:/app
    networks:
      - monitoring_net

  # Frontend - ONLY PUBLIC SERVICE
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"  # ONLY public port
    environment:
      - REACT_APP_API_URL=https://api.${HOSTNAME:-localhost}
      - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - api_service
    networks:
      - monitoring_net

volumes:
  postgres_data:
  browser_data:

networks:
  monitoring_net:
    driver: bridge
